<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finna Assist</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-center p-6">

<h1 class="text-4xl font-bold">Finna Assist</h1>
<p>Empowering Communities Through the R10 Challenge</p>

<img src="https://picsum.photos/800/300" class="mx-auto mt-4 rounded">

<h2 class="text-2xl mt-6 font-bold">Challenge Initiative</h2>
<p>Join thousands making change with just R10.</p>

<div class="bg-gray-50 text-center">

<h1 class="text-4xl font-bold mt-10">Finna Assist</h1>
<p class="mt-2">R10 Challenge - Small Change, Big Impact</p>
</div>

<div class="mt-6">
  <p id="counter" class="text-3xl font-bold">R0</p>
</div>

<div class="mt-6 space-x-3">
  <button onclick="donate()" class="bg-blue-600 text-white px-4 py-2 rounded">Donate R10</button>
  <a href="https://wa.me/27672974266" class="bg-green-500 text-white px-4 py-2 rounded">WhatsApp</a>
</div>

<div class="mt-10">
  <h2 class="text-xl font-bold">Sign Up</h2>
  <input id="name" placeholder="Name" class="border p-2 m-2">
  <input id="email" placeholder="Email" class="border p-2 m-2">
  <button onclick="signup()" class="bg-black text-white px-4 py-2 rounded">Join</button>
</div>

<div class="mt-10">
  <h2 class="text-xl font-bold">Leaderboard</h2>
  <ul id="leaderboard"></ul>
</div>

<div class="mt-6 space-x-3">
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="plans.html">Savings Plans</a>
</div>


<script>
const BACKEND_URL = "https://finna-assist-backend.onrender.com";

async function loadTotal(){
  const res = await fetch(BACKEND_URL + "/api/donations/total");
  const data = await res.json();
  document.getElementById("counter").innerText = "R" + data.total;
}

async function donate(){
  await fetch(BACKEND_URL + "/api/donations", {method: "POST"});
  loadTotal();
}

async function signup(){
  await fetch(BACKEND_URL + "/api/users/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value
    })
  });
  loadLeaderboard();
}

async function loadLeaderboard(){
  const res = await fetch(BACKEND_URL + "/api/users/leaderboard");
  const data = await res.json();
  document.getElementById("leaderboard").innerHTML =
    data.map(u => "<li>"+u.name+"</li>").join("");
}

setInterval(loadTotal, 3000);
loadTotal();
loadLeaderboard();
</script>

</body>
</html>

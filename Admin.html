<h1>Admin Dashboard         </h1>
<p>Welcome, Admin! Here you can manage users, view donations, and oversee the Finna Assist platform.</p>
<p id="stats"></p>

<script>
    fetch('https://finna-assist-backend.onrender.com/api/admin/stats', {
        headers: {
            'Authorization': 'TshogofatsoLovesPercyAfricaRamotshela' 
        }
    })
        .then(response => response.json())
        .then(data => {
            document.getElementById('stats').innerText = `Users: ${data.users}, Total Donations: R${data.totalDonations}`;
        })
        .catch(error => {
            console.error('Error fetching admin stats:', error);
            document.getElementById('stats').innerText = 'Error loading stats.';
        });
        
</script>
